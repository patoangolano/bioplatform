name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: 187.77.232.5
  VPS_USER: root
  DEPLOY_PATH: /opt/bioplatform

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check apps/api/ mcp_servers/

      - name: Type check imports
        run: |
          pip install pyright
          cd apps/api && pyright --verifytypes models schemas || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd apps/web
          npm ci
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            git pull origin main
            for f in infra/db/migrations/*.sql; do
              docker compose exec -T postgres psql -U bio -d biodb < "$f" 2>/dev/null || true
            done
            docker compose build --parallel
            docker compose up -d
            docker compose up -d web
            sleep 15
            docker compose ps
            echo "Deploy done at $(date)"
